{% extends "base.html" %}

{% block titulo %}{{ titulo }} // GDELT{% endblock %}

{% block contenido %}
<h1 class="titulo-pagina">{{ titulo }}</h1>
<div class="meta-pagina" id="meta">cargando datos.</div>

<div id="vista-analisis"
     data-nombre="{{ nombre }}"
     data-color="{{ color }}"
     {% if barra %}data-barra='{{ barra | tojson }}'{% endif %}>

    <section class="panel">
        <h2>gráfico</h2>
        <div id="grafico"><p class="cargando">dibujando.</p></div>
    </section>

    <section class="panel">
        <h2>tabla de resultados</h2>
        <div id="tabla"><p class="cargando">cargando.</p></div>
    </section>
</div>

<script src="{{ url_for('static', filename='d3.v7.min.js') }}"></script>
<script src="{{ url_for('static', filename='charts.js') }}"></script>
{% endblock %}
