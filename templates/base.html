<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>{% block titulo %}Visualizador GDELT{% endblock %}</title>
    <style>
        /* estilos minimos, nada fancy por ahora ^.^ */
        body { font-family: monospace; margin: 20px; }
        table { border-collapse: collapse; }
        td, th { border: 1px solid black; padding: 2px 6px; }
        .barra-fila { margin: 2px 0; }
        .barra-etiqueta { display: inline-block; width: 280px; }
        .barra { display: inline-block; height: 12px; background: gray; vertical-align: middle; }
    </style>
</head>
<body>
    <h1>Analisis de Eventos Mundiales - GDELT</h1>
    <p>
        <a href="/">Inicio</a> |
        <a href="/conclusiones">Conclusiones</a>
    </p>
    <hr>
    {% block contenido %}{% endblock %}
</body>
</html>
